[general]
live_config_reload = true
ipc_socket = true

[env]
TERM = "xterm-256color"

[window]
padding = { x = 5, y = 5 }
decorations = "None"
opacity = 0.95
startup_mode = "Maximized"

[font]
size = 11.0
normal = {family = "Hack Nerd Font Mono", style = "Regular"}



[colors]
[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"
bright_foreground = "#ffffff"

[colors.cursor]
text = "#282a36"
cursor = "#f8f8f2"

[colors.vi_mode_cursor]
text = "CellBackground"
cursor = "CellForeground"

[colors.selection]
text = "CellForeground"
background = "#44475a"

[colors.normal]
black = "#21222c"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#f8f8f2"

[colors.bright]
black = "#6272a4"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"

[colors.search.matches]
foreground = "#44475a"
background = "#50fa7b"

[colors.search.focused_match]
foreground = "#44475a"
background = "#ffb86c"

[colors.footer_bar]
background = "#282a36"
foreground = "#f8f8f2"

[colors.hints.start]
foreground = "#282a36"
background = "#f1fa8c"

[colors.hints.end]
foreground = "#f1fa8c"
background = "#282a36"




[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 750

[scrolling]
history = 100000
multiplier = 8

[keyboard]
bindings = [
    {key = "N", mods = "Control|Shift", action = "SpawnNewInstance"},
    {key = "C", mods = "Control|Shift", action = "Copy"},
    {key = "Q", mods = "Super", action = "Quit"},
    {key = "V", mods = "Control|Shift", action = "Paste"},
]

[terminal]
shell = { program = "/usr/bin/zsh" }
osc52 = "CopyPaste"
