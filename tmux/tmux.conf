# =============================================================================
# General Settings
# =============================================================================
set -s escape-time 0
set -sg repeat-time 300
set -s focus-events on
set -g mouse on
set -g detach-on-destroy off
set -g history-limit 200000
set-option -g default-shell /usr/bin/zsh
set -g visual-activity on
setw -g monitor-bell off

# =============================================================================
# Prefix
# =============================================================================
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix

# =============================================================================
# Display & Terminal
# =============================================================================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 2000
set -g display-time 2000
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# =============================================================================
# Navigation
# =============================================================================
# General navigation
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
bind -n M-D detach-client
bind C-c new-session
bind -n M-o new-window -c "#{pane_current_path}"
bind -n M-Q kill-pane
bind , command-prompt -p "Rename window:" "rename-window '%%'"
bind C-j display-popup -E -w 80% -h 60% "~/.config/scripts/tmux_session_switch.sh"

# Window navigation
unbind n
unbind p
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0

bind -r C-p previous-window
bind -r C-n next-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n 'M-#' join-pane -t :3
bind -n 'M-$' join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9

# Splitting windows
bind k split-window -vb -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind h split-window -hb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
unbind %

# Pane layout & zoom
bind -n M-f resize-pane -Z
bind -n C-Space next-layout

# Pane selection & navigation
bind 1 select-pane -t:.1
bind 2 select-pane -t:.2
bind 3 select-pane -t:.3
bind 4 select-pane -t:.4
bind 5 select-pane -t:.5
bind 6 select-pane -t:.6
bind 7 select-pane -t:.7
bind 8 select-pane -t:.8
bind 9 select-pane -t:.9
bind 0 select-pane -t:.10

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind > swap-pane -D
bind < swap-pane -U
bind | swap-pane

bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3

# Layout tree
bind W choose-tree -Z
bind S choose-tree 'move-pane -v -s "%%"'
bind V choose-tree 'move-pane -h -s "%%"'

# =============================================================================
# Copy Mode
# =============================================================================
set -g mode-style "bg=#cba6f7,fg=#1e1e2e"
setw -g mode-keys vi
bind -n M-v copy-mode

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind -T copy-mode-vi h   send-keys -X cursor-left
bind -T copy-mode-vi j   send-keys -X cursor-down
bind -T copy-mode-vi k   send-keys -X cursor-up
bind -T copy-mode-vi l   send-keys -X cursor-right

bind -T copy-mode-vi J   send-keys -N 5 -X cursor-down
bind -T copy-mode-vi K   send-keys -N 5 -X cursor-up

bind -T copy-mode-vi H   send-keys -X back-to-indentation
bind -T copy-mode-vi L   send-keys -X end-of-line

bind -T copy-mode-vi w   send-keys -X next-word
bind -T copy-mode-vi b   send-keys -X previous-word
bind -T copy-mode-vi e   send-keys -X next-word-end

bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up

bind -T copy-mode-vi n   send-keys -X search-again
bind -T copy-mode-vi N   send-keys -X search-reverse

bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send-keys -X copy-end-of-line

# =============================================================================
# Buffer Management
# =============================================================================
bind b list-buffers
bind p paste-buffer

# =============================================================================
# Status Bar & Styling
# =============================================================================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 2

# Status line formatting
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 120
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1,bold] #S #[default]#{?client_prefix,#[fg=#1e1e2e,bg=#f38ba8,bold] PREFIX #[default],}"
set -g status-right '%I:%M %p'

# Windows styling
set -g window-status-format " #[fg=#a6adc8]#I#[fg=#6c7086]:#W "
set -g window-status-current-format " #[bold,fg=#1e1e2e,bg=#89b4fa] #I:#W #[default]"
set -g window-status-activity-style "fg=#f9e2af,bold"
set -g window-status-bell-style "fg=#f38ba8,bold"
set -g window-status-separator " "

# Pane styling
set -g pane-border-lines single
#set -g pane-border-style "fg=#45475a"
#set -g pane-active-border-style "fg=#a6e3a1"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#BD93F9"
#set -g pane-border-status top
set -g pane-border-status off
set -g pane-border-format "#{pane_index}:#{pane_current_path}"

