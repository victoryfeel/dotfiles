# ========================= general =========================
set -s escape-time 0
set -sg repeat-time 300
set -s focus-events on
set -g mouse on
set -sg exit-empty on
set -g detach-on-destroy off
set -g history-limit 200000
set-option -g default-shell /usr/bin/zsh
set -g visual-activity on
# windows有活动提示, 测试完成有日志输出等
setw -g monitor-activity off
setw -g monitor-bell off

# reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux.conf"
# alt+shift+D detach tmux
bind -n M-D detach-client


# ========================= prefix =========================
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix


# ========================= display =========================
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on

# prefix+q显示panel序号
set -g display-panes-time 2000
set -g display-time 2000

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
#set -ga terminal-overrides ",xterm-256color:RGB"C-n




# ========================= navigation ============================
# ctrl+c创建新的tmux-session
bind C-c new-session
# alt+o创建新窗口，继承当前路径
bind -n M-o new-window -c "#{pane_current_path}"
# alt+shift+Q关闭当前panel
bind -n M-Q kill-pane
# prefix+,重命名当前窗口
bind , command-prompt -p "Rename window:" "rename-window '%%'"
# prefix+ctrl+j fzf search session
bind C-j display-popup -E -w 80% -h 60% "~/.config/scripts/tmux_session_switch.sh"

# ------------------------ window navigation ------------------------
unbind n
unbind p
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0

# ctrl+p跳到前一个窗口
bind -r C-p previous-window
# ctrl+n跳到下一个窗口
bind -r C-n next-window

# alt+num 跳到指定窗口
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# alt+shift+num将当前panel加入指定窗口
bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n 'M-#' join-pane -t :3
bind -n 'M-$' join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9

# prefix+kjhl to split window
bind k split-window -vb -c "#{pane_current_path}"
bind j split-window -v -c "#{pane_current_path}"
bind h split-window -hb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"
unbind %

# alt+f panel full-screen toggle
bind -n M-f resize-pane -Z

# ------------------------ pane navigation ------------------------
# prefix+numj 跳到指定panel
bind 1 select-pane -t:.1
bind 2 select-pane -t:.2
bind 3 select-pane -t:.3
bind 4 select-pane -t:.4
bind 5 select-pane -t:.5
bind 6 select-pane -t:.6
bind 7 select-pane -t:.7
bind 8 select-pane -t:.8
bind 9 select-pane -t:.9
bind 0 select-pane -t:.10
# alt+hjkl to switch panel
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# 当前panel与下方panel交换
bind > swap-pane -D
# 当前panel与上方panel交换
bind < swap-pane -U
# 与当前最近panel交换
bind | swap-pane

# ctrl+space 切换到下一个panel布局
bind -n C-Space next-layout

# alt+shift+hjkl to resize pane
bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3

# ------------------------ layout-tree ------------------------
# prefix+W 查看所有session/window/panel
bind W choose-tree -Z
# prefix+S上下移动当前panel到指定窗口
bind S choose-tree 'move-pane -v -s "%%"'
# prefix+V左右移动当前panel到指定窗口
bind V choose-tree 'move-pane -h -s "%%"'


# ============================ copy mode ============================

set -g mode-style "bg=#cba6f7,fg=#1e1e2e"
# 全局启用vim model
setw -g mode-keys vi
# alt+v进入copy model
bind -n M-v copy-mode

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# 基础移动（对齐 neovim hjkl）
bind -T copy-mode-vi h   send-keys -X cursor-left
bind -T copy-mode-vi j   send-keys -X cursor-down
bind -T copy-mode-vi k   send-keys -X cursor-up
bind -T copy-mode-vi l   send-keys -X cursor-right

# 快速跳行（对齐 neovim J=5j / K=5k）
bind -T copy-mode-vi J   send-keys -N 5 -X cursor-down
bind -T copy-mode-vi K   send-keys -N 5 -X cursor-up

# 行首/行尾（对齐 neovim H=^ / L=$）
bind -T copy-mode-vi H   send-keys -X back-to-indentation
bind -T copy-mode-vi L   send-keys -X end-of-line

# 单词移动（对齐 neovim w/b/e）
bind -T copy-mode-vi w   send-keys -X next-word
bind -T copy-mode-vi b   send-keys -X previous-word
bind -T copy-mode-vi e   send-keys -X next-word-end

# 页面跳转（对齐 neovim C-d/C-u）
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up

# 搜索（对齐 neovim n/N）
bind -T copy-mode-vi n   send-keys -X search-again
bind -T copy-mode-vi N   send-keys -X search-reverse

# 复制
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y   send-keys -X copy-end-of-line

# ============================ buffer management ============================
# prefix+b 列出所有复制缓冲器
bind b list-buffers
# prefix+p paste最新的缓冲区
bind p paste-buffer


# ============================ customize style ============================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 2

# status bar
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 120
set -g status-left "#[fg=#1e1e2e,bg=#a6e3a1,bold] #S #[default]#{?client_prefix,#[fg=#1e1e2e,bg=#f38ba8,bold] PREFIX #[default],}"
set -g status-right '%I:%M %p'
# windows
set -g window-status-format " #[fg=#a6adc8]#I#[fg=#6c7086]:#W "
set -g window-status-current-format " #[bold,fg=#1e1e2e,bg=#89b4fa] #I:#W #[default]"
set -g window-status-activity-style "fg=#f9e2af,bold"
set -g window-status-bell-style "fg=#f38ba8,bold"
set -g window-status-separator " "
# panel
set -g pane-border-lines single
set -g pane-border-style "fg=#45475a"
#set -g pane-active-border-style "fg=#a6e3a1"
set -g pane-active-border-style "fg=#BD93F9"
#set -g pane-border-status top
set -g pane-border-status off
set -g pane-border-format "#{pane_index}:#{pane_current_path}"


# ============================ Tmux Plugin Manager ============================
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# prefix+I install,prefix+U update,prefix+alt+U remove
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tpope/vim-obsession'
set -g @plugin 'tmux-python/tmuxp'

# resurrect: restore vim/nvim sessions if possible
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
# continuum: auto save / auto restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
